<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♥ Happy 1 Month ♥</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body {
  font-family: "Comic Sans MS", sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
}

/* TITLE */
.title-img {
  margin: 40px auto 60px auto;
  width: 400px;
  max-width: 90%;
}

/* CARD */
.card {
  width: 400px;
  height: 250px;
  perspective: 1200px;
  max-width: 90%;
  position: relative;
  transform-style: preserve-3d;
  touch-action: none;
}

/* STACK */
.stack {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  top: 0;
  left: 0;
  z-index: -1;
}

.stack-1 {
  transform: translateY(8px) scale(0.98);
  opacity: 0.6;
}

.stack-2 {
  transform: translateY(16px) scale(0.96);
  opacity: 0.3;
}

/* INNER */
.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.22,1,0.36,1);
  transform-style: preserve-3d;
  transform: translateZ(0); /* ← fixes GPU flicker */
}

.inner.flipped {
  transform: rotateX(180deg);
}

/* FACES */
.face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
 
  transform: translateZ(2px);
}

.front {
  background: #3c4324;  /* instead of gradient (test this) */
}

/* EDGE (card thickness) */
.edge {
  position: absolute;
  height: 4px;            /* thickness */
  width: 100%;
  top: 50%;
  left: 0;

  transform: translateY(-50%) rotateX(90deg);
  transform-origin: center;

  background: linear-gradient(
    to right,
    #999,
    #ddd,
    #999
  );

  pointer-events: none;
}

.back {
  background: #EDC001;
  transform: rotateX(180deg) translateZ(2px);
}

/* TEXT */
.content {
  font-size: clamp(26px, 3vw, 34px);
  padding: 25px;
  text-align: center;
  max-width: 90%;
}

/* BUTTONS */
.controls {
  margin-top: 20px;
  display: flex;
  gap: 30px;
}

button {
  font-family: "Comic Sans MS", sans-serif;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #a855f7;
  color: black;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
  background: #EDC001;
}

button:active {
  transform: scale(0.9);
}

.icon-btn {
  width: 50px;
  height: 50px;
  cursor: pointer;
  transition: transform 0.15s ease, filter 0.2s ease;
}

.icon-btn:hover {
  transform: scale(1.1);
  filter: brightness(1.2);
}

.icon-btn:active {
  transform: scale(0.9);
}
</style>
</head>

<body>

<img src="titleIcon.png" class="title-img">

<div class="card" id="card">
  <div class="stack stack-2"></div>
  <div class="stack stack-1"></div>

  <div class="inner" id="inner">
    <div class="face front">
      <div class="content" id="front"></div>
    </div>
    <div class="face back">
      <div class="content" id="back"></div>
    </div>
     <div class="edge"></div>
  </div>
</div>

<div class="controls">
  <img src="leftArrowIcon.png" class="icon-btn" onclick="swipeRight()">

  <button onclick="flipCard()">Flip</button>

  <img src="rightArrowIcon.png" class="icon-btn" onclick="swipeLeft()">

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let cards = [];
let index = 0;
let flipped = false;

/* LOAD EXCEL */
async function loadExcel() {
  const res = await fetch('data/flashcards.xlsx');
  const buffer = await res.arrayBuffer();

  const workbook = XLSX.read(buffer);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  cards = json.map(r => ({
    front: r.Front,
    back: r.Back
  }));

  showCard();
}

/* DISPLAY */
function showCard() {
  document.getElementById("front").textContent = cards[index].front;
  document.getElementById("back").textContent = cards[index].back;

  flipped = false;
  inner.classList.remove("flipped");
}

/* FLIP */
function flipCard() {
  flipped = !flipped;
  inner.classList.toggle("flipped");
}

/* NAV */
function nextCard() {
  index = (index + 1) % cards.length;
  showCard();
}

function prevCard() {
  index = (index - 1 + cards.length) % cards.length;
  showCard();
}

/* SWIPE */
let startX = 0, startY = 0;
let currentX = 0, currentY = 0;
let dragging = false;
const card = document.getElementById("card");
const inner = document.getElementById("inner");

card.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  dragging = true;
});

card.addEventListener("touchmove", e => {
  if (!dragging) return;

  currentX = e.touches[0].clientX;
  currentY = e.touches[0].clientY;

  const diffX = currentX - startX;
  const diffY = currentY - startY;

  // ONLY move card if horizontal swipe dominates
  if (Math.abs(diffX) > Math.abs(diffY)) {
    card.style.transform = `
      translateX(${diffX}px)
      rotate(${diffX * 0.05}deg)
    `;
  }
});

card.addEventListener("touchend", () => {
  dragging = false;

  const diffX = currentX - startX;
  const diffY = currentY - startY;

  // 👉 PRIORITY: vertical swipe (flip)
  if (Math.abs(diffY) > Math.abs(diffX) && diffY < -60) {
  // swipe up animation
  card.style.transition = "transform 0.2s ease";
  card.style.transform = "translateY(-50px)";

  setTimeout(() => {
    flipCard();
    reset(true);
  }, 150);

  return;
}

  // 👉 horizontal swipe (navigation)
  if (diffX > 80) {
    swipeRight();
  } else if (diffX < -80) {
    swipeLeft();
  } else {
    reset();
  }
});

/* DESKTOP */
card.addEventListener("mousedown", e => {
  startX = e.clientX;
  dragging = true;
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;
  currentX = e.clientX;
  let diff = currentX - startX;

  card.style.transform = `translateX(${diff}px) rotate(${diff*0.05}deg)`;
});

window.addEventListener("mouseup", () => {
  if (!dragging) return;
  dragging = false;
  let diff = currentX - startX;

  if (diff > 100) swipeRight();
  else if (diff < -100) swipeLeft();
  else reset();
});

/* SWIPE ACTIONS */
function swipeRight() {
  card.style.transition = "transform 0.35s ease";
  card.style.transform = "translateX(500px) rotate(15deg)";

  setTimeout(() => {
    nextCard();
    reset(true);
  }, 280);
}

function swipeLeft() {
  card.style.transition = "transform 0.35s ease";
  card.style.transform = "translateX(-500px) rotate(-15deg)";

  setTimeout(() => {
    prevCard();
    reset(true);
  }, 280);
}

function reset(skip=false) {
  card.style.transition = skip ? "none" : "0.3s";
  card.style.transform = "translateX(0) rotate(0)";
}

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") swipeLeft();
  if (e.key === "ArrowLeft") swipeRight();
  if (e.key === " ") flipCard();
});

/* CLICK */
card.addEventListener("click", flipCard);

/* START */
loadExcel();
</script>

</body>
</html>
