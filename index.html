<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1 Month </title>

<style>
body {
  font-family: "Comic Sans MS", "Comic Sans";
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
}

.title-img {
  display: block;
  margin: 40px auto 60px auto;
  width: 350px;
  max-width: 90%;
}

.card {
  width: 500px;
  height: 300px;
  perspective: 1000px;
  margin: 40px auto 60px auto;
  cursor: pointer;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.flipped {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  backface-visibility: hidden;
}

.content {
  font-size: clamp(30px, 3vw, 36px);
  padding: 25px;
  text-align: center;
  max-width: 400px; /*clamp max width of text*/
  line-height: 1.5;
}

.front {
  background: #3c4324;
}

.back {
  background: #EDC001;
  transform: rotateY(180deg);
}

.controls {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<img src="SJ Name Asset.png" alt="Name" class="title-img">

<div class="card" id="card">
  <div class="inner" id="inner">
    <div class="face front">
  <div class="content" id="front"></div>
</div>

<div class="face back">
  <div class="content" id="back"></div>
</div>
  </div>
</div>

<div class="controls">
  <button onclick="prevCard()">←</button>
  <button onclick="flipCard()">Flip</button>
  <button onclick="nextCard()">→</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let cards = [];
let index = 0;
let flipped = false;

// LOAD EXCEL FROM REPO
async function loadExcel() {
  const res = await fetch('data/flashcards.xlsx');
  const buffer = await res.arrayBuffer();

  const workbook = XLSX.read(buffer);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  cards = json.map(row => ({
    front: row.Front || row.front,
    back: row.Back || row.back
  }));

  showCard();
}

// DISPLAY CARD
function showCard() {
  if (cards.length === 0) return;

  document.getElementById("front").textContent = cards[index].front;
  document.getElementById("back").textContent = cards[index].back;

  flipped = false;
  document.getElementById("inner").classList.remove("flipped");
}

// FLIP CARD
function flipCard() {
  flipped = !flipped;
  document.getElementById("inner").classList.toggle("flipped");
}

// NAVIGATION
function nextCard() {
  index = (index + 1) % cards.length;
  showCard();
}

function prevCard() {
  index = (index - 1 + cards.length) % cards.length;
  showCard();
}

// CLICK TO FLIP
document.getElementById("card").addEventListener("click", flipCard);

// KEYBOARD CONTROLS
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") nextCard();
  if (e.key === "ArrowLeft") prevCard();
  if (e.key === " ") flipCard();
});

// START
loadExcel();
</script>

</body>
</html>
