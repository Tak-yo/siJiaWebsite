<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1 Month </title>

<style>
body {
  font-family: "Comic Sans MS", "Comic Sans", fantasy;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
}

.title-img {
  display: block;
  margin: 40px auto 60px auto;
  width: 350px;
  max-width: 90%;
}

.card {
  width: 400px;
  height: 250px;
  perspective: 1200px; /* deeper 3D */
  cursor: pointer;
}


.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}

.card {
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  transition: box-shadow 0.3s ease, transform 0.3s ease;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

.inner.flipped {
  transform: rotateY(180deg);
}

.spring-next-out {
  animation: springNextOut 0.5s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
}

.spring-prev-out {
  animation: springPrevOut 0.5s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
}

.spring-next-in {
  animation: springNextIn 0.55s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
}

.spring-prev-in {
  animation: springPrevIn 0.55s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
}

@keyframes springNextOut {
  0%   { transform: translateX(0) scale(1) rotateY(0deg); opacity: 1; }
  35%  { transform: translateX(40px) scale(0.98) rotateY(6deg); opacity: 0.9; }
  100% { transform: translateX(520px) scale(0.9) rotateY(18deg); opacity: 0; }
}

@keyframes springPrevOut {
  0%   { transform: translateX(0) scale(1) rotateY(0deg); opacity: 1; }
  35%  { transform: translateX(-40px) scale(0.98) rotateY(-6deg); opacity: 0.9; }
  100% { transform: translateX(-520px) scale(0.9) rotateY(-18deg); opacity: 0; }
}

@keyframes springNextIn {
  0%   { transform: translateX(-520px) scale(0.9) rotateY(-18deg); opacity: 0; }
  60%  { transform: translateX(18px) scale(1.02) rotateY(2deg); opacity: 1; }
  100% { transform: translateX(0) scale(1) rotateY(0deg); opacity: 1; }
}

@keyframes springPrevIn {
  0%   { transform: translateX(520px) scale(0.9) rotateY(18deg); opacity: 0; }
  60%  { transform: translateX(-18px) scale(1.02) rotateY(-2deg); opacity: 1; }
  100% { transform: translateX(0) scale(1) rotateY(0deg); opacity: 1; }
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;

  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;   /* ← CRITICAL FIX */

  transform-style: preserve-3d;          /* ← ALSO IMPORTANT */
}

.content {
  font-size: clamp(30px, 3vw, 36px);
  padding: 25px;
  text-align: center;
  max-width: 400px; /*clamp max width of text*/
  line-height: 1.5;
}

.front {
  background: #3c4324;
}

.back {
  background: #EDC001;
  transform: rotateY(180deg);
}

.controls {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  background: #a855f7;
  color: #0f172a;
  font-family: "Comic Sans MS", "Comic Sans", cursive;
  transition: transform 0.15s ease, filter 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
  background: #EDC001;
}

button:active {
  transform: scale(0.92);
  filter: brightness(0.95);
  box-shadow: 0 0 6px rgba(56, 189, 248, 0.4);
}


/* Body */

</style>
</head>

<body>

<img src="SJ Name Asset.png" alt="Name" class="title-img">

<div class="card" id="card">
  <div class="inner" id="inner">
    <div class="face front">
  <div class="content" id="front"></div>
</div>

<div class="face back">
  <div class="content" id="back"></div>
</div>
  </div>
</div>

<div class="controls">
  <button onclick="prevCard()">←</button>
  <button onclick="flipCard()">Flip</button>
  <button onclick="nextCard()">→</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let cards = [];
let index = 0;
let flipped = false;

// LOAD EXCEL FROM REPO
async function loadExcel() {
  const res = await fetch('data/flashcards.xlsx');
  const buffer = await res.arrayBuffer();

  const workbook = XLSX.read(buffer);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  cards = json.map(row => ({
    front: row.Front || row.front,
    back: row.Back || row.back
  }));

  showCard();
}

// DISPLAY CARD
function showCard() {
  if (cards.length === 0) return;

  document.getElementById("front").textContent = cards[index].front;
  document.getElementById("back").textContent = cards[index].back;

  flipped = false;
  document.getElementById("inner").classList.remove("flipped");
}

// FLIP CARD
function flipCard() {
  flipped = !flipped;
  document.getElementById("inner").classList.toggle("flipped");
}

// NAVIGATION
let animating = false;

function nextCard() {
  if (animating || cards.length === 0) return;
  animating = true;

  const inner = document.getElementById("inner");
  inner.classList.remove("spring-next-in", "spring-prev-in", "spring-prev-out");
  inner.classList.add("spring-next-out");

  setTimeout(() => {
    index = (index + 1) % cards.length;
    showCard();

    inner.classList.remove("spring-next-out");
    inner.classList.add("spring-next-in");

    setTimeout(() => {
      inner.classList.remove("spring-next-in");
      animating = false;
    }, 550);
  }, 500);
}

function prevCard() {
  if (animating || cards.length === 0) return;
  animating = true;

  const inner = document.getElementById("inner");
  inner.classList.remove("spring-prev-in", "spring-next-in", "spring-next-out");
  inner.classList.add("spring-prev-out");

  setTimeout(() => {
    index = (index - 1 + cards.length) % cards.length;
    showCard();

    inner.classList.remove("spring-prev-out");
    inner.classList.add("spring-prev-in");

    setTimeout(() => {
      inner.classList.remove("spring-prev-in");
      animating = false;
    }, 550);
  }, 500);
}

function showCard() {
  if (cards.length === 0) return;

  document.getElementById("front").textContent = cards[index].front;
  document.getElementById("back").textContent = cards[index].back;

  flipped = false;
  document.getElementById("inner").classList.remove("flipped");
}

function flipCard() {
  if (animating) return;
  flipped = !flipped;
  document.getElementById("inner").classList.toggle("flipped", flipped);
}

// CLICK TO FLIP
document.getElementById("card").addEventListener("click", flipCard);

// KEYBOARD CONTROLS
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") nextCard();
  if (e.key === "ArrowLeft") prevCard();
  if (e.key === " ") flipCard();
});

// START
loadExcel();
</script>

</body>
</html>
